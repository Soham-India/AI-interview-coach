spring.application.name=ai-interview-coach
# ============================================================
# SERVER
# ============================================================
server.port=${PORT:8080}

# ============================================================
# DATABASE — TiDB Serverless
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# SECURITY
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# AI
# ============================================================
spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_GENAI_API_KEY}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-3.1-flash-lite}

# ============================================================
# RETRY (Gemini rate limits)
# ============================================================
spring.ai.retry.max-attempts=3
spring.ai.retry.initial-interval=5000
spring.ai.retry.multiplier=2.0
spring.ai.retry.on-http-codes=429

# ============================================================
# CORS
# ============================================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# ============================================================
# LOGGING — minimal in production
# ============================================================
logging.level.root=WARN
logging.level.com.soham=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ============================================================
# AI QUOTA MANAGEMENT
# ============================================================
gemini.quota.daily-limit=500
gemini.quota.warning-threshold=90
gemini.quota.block-threshold=100